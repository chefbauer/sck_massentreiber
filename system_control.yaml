# ============================================================
# System Control – Standby-Erkennung, System-übergreifende Automatismen
# ============================================================
# ── Komponenten ──────────────────────────────────────────────────────────────────
#  binary_sensor:   bin_standby
# ─────────────────────────────────────────────────────────────────────────────────

binary_sensor:
  # ── Standby-Erkennung ──────────────────────────────────────────────────────────
  # EIN wenn: TOF frei (>800mm oder NaN) UND LVGL idle UND Motor steht
  # delayed_on: ${c_standby_delay} → erst nach dieser Zeit wird Standby aktiv
  - platform: template
    id: bin_standby
    name: "Standby"
    internal: true
    lambda: |-
      float d = id(distance_sensor).state;
      bool tof_frei = isnan(d) || d > ${c_standby_tof_min_mm};
      return tof_frei && id(global_lvgl_is_idle) && !id(sw_aktiv) && !id(dr_aktiv);
    filters:
      - delayed_on: ${c_standby_delay}
      - delayed_off: 3s
    on_press:
      - lvgl.widget.show: lbl_standby_icon
      - if:
          condition:
            lambda: 'return id(global_standby_open_ventil);'
          then:
            - lambda: |-
                id(flag_standby_block_pump_auto) = true;
                id(script_pumpe_a_kurz).stop();
                id(script_pumpe_a_lang).stop();
                id(script_rv_pumpe_start).stop();
                id(pumpe_a_aktiv) = false;
                id(pumpe_a_auto_war_an) = false;
                id(rv_auto_phase_ms) = 0;
                id(rv_auto_pump_on)  = false;
                id(output_pumpe_dacA).set_level(0.0f);
                ESP_LOGI("standby", "Block: Pump-AUTO gesperrt, Pumpe+RV aus");
    on_release:
      - lvgl.widget.hide: lbl_standby_icon
      - if:
          condition:
            lambda: 'return id(system_ein) && id(global_standby_open_ventil) && id(pumpe_a_modus) == 2;'
          then:
            - lambda: |-
                id(flag_standby_block_pump_auto) = false;
                ESP_LOGI("standby", "Block aufgehoben – Turbo-Füllung startet");
                id(script_pumpe_a_lang).execute();
          else:
            - lambda: |-
                id(flag_standby_block_pump_auto) = false;
                ESP_LOGI("standby", "Block aufgehoben – Pump-AUTO wieder frei");
