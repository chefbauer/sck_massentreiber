                    # P5
                    - button:
                        id: btn_preset5
                        width: 178
                        height: 80
                        align: LEFT_MID
                        x: 771
                        styles: style_preset_btn
                        widgets:
                          - label:
                              id: lbl_preset5_name
                              text: "⑤"
                              align: TOP_LEFT
                              x: 12
                              y: 8
