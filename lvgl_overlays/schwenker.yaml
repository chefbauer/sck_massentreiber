                              id(sw_max_speed_rpm)  = id(preset4_rpm);
                              id(sw_acc)            = id(preset4_acc);
                              lv_arc_set_value(id(arc_schwenkzeit), (int)(id(preset4_hp_ms)/100));
                              lv_arc_set_value(id(arc_rpm), id(preset4_rpm));
                              lv_arc_set_value(id(arc_acc), id(preset4_acc));
                              char b1[8]; snprintf(b1,sizeof(b1),"%.1fs",id(preset4_hp_ms)/1000.0f);
                              lv_label_set_text(id(lbl_arc_zeit_val), b1);
                              char b2[6]; snprintf(b2,sizeof(b2),"%d",id(preset4_rpm));
                              lv_label_set_text(id(lbl_arc_rpm_val), b2);
                              char b3[6]; snprintf(b3,sizeof(b3),"%d%%",id(preset4_acc));
                              lv_label_set_text(id(lbl_arc_acc_val), b3);
                              ESP_LOGI("preset","P4 geladen");
                        on_long_press:
                          - lambda: |-
                              id(preset4_hp_ms) = id(sw_halbperiode_ms);
                              id(preset4_rpm)   = id(sw_max_speed_rpm);
