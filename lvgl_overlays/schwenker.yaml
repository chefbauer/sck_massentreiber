                                       id(drp4_rpm), id(drp4_acc),
                                       id(drp4_pumpe) ? "ON" : "OFF");
                              lv_label_set_text(id(lbl_drp4_vals), buf);
                              ESP_LOGI("drpreset", "DP4 gespeichert");
                    # DP5
                    - button:
                        id: btn_drp5
                        width: 178
                        height: 80
                        align: LEFT_MID
                        x: 771
                        styles: style_preset_btn
                        widgets:
                          - label:
                              id: lbl_drp5_name
                              text: "${c_drp5_name}"
                              align: TOP_MID
                              y: 8
                              text_font: font_small
                              text_color: 0xDDEEFF
                          - label:
                              id: lbl_drp5_vals
                              text: "R:150, A:220, P:ON"
                              align: BOTTOM_MID
                              y: -8
                              text_font: font_small
                              text_color: 0xAABBFF
                        on_short_click:
                          - lambda: |-
                              id(dr_speed_rpm)  = id(drp5_rpm);
                              id(dr_acc)        = id(drp5_acc);
                              id(dr_richtung)   = id(drp5_richtung);
                              id(dr_motor_mode) = id(drp5_mode);
                              id(dr_pumpe_auto) = id(drp5_pumpe);
                              lv_arc_set_value(id(arc_dr_rpm), id(drp5_rpm));
                              lv_arc_set_value(id(arc_dr_acc), id(drp5_acc));
                              char b_rpm5[8]; snprintf(b_rpm5, sizeof(b_rpm5), "%d", id(drp5_rpm));
                              lv_label_set_text(id(lbl_dr_rpm_val), b_rpm5);
                              char b_acc5[8]; snprintf(b_acc5, sizeof(b_acc5), "%d", id(drp5_acc));
                              lv_label_set_text(id(lbl_dr_acc_val), b_acc5);
                              { float _rt = (float)(id(drp5_rpm) * 8) * (256 - id(drp5_acc)) * 0.00005f;
                                char b_rt5[10]; snprintf(b_rt5, sizeof(b_rt5), "%.1fs", _rt);
                                lv_label_set_text(id(lbl_dr_ramp_info), b_rt5); }
                              if (id(drp5_richtung) > 0) {
                                lv_label_set_text(id(lbl_dr_richtung), "Rechts \xef\x81\x8b");
                                lv_obj_set_style_bg_color(id(btn_dr_richtung), lv_color_hex(0x1a6b4a), 0);
                              } else {
                                lv_label_set_text(id(lbl_dr_richtung), "Links \xef\x81\x8b");
                                lv_obj_set_style_bg_color(id(btn_dr_richtung), lv_color_hex(0x1a4a6b), 0);
                              }
                              if (id(drp5_mode) == 4) {
                                lv_label_set_text(id(lbl_dr_mode), "Closed Loop");
                                lv_obj_set_style_bg_color(id(btn_dr_mode), lv_color_hex(0x553388), 0);
                              } else {
                                lv_label_set_text(id(lbl_dr_mode), "FOC");
                                lv_obj_set_style_bg_color(id(btn_dr_mode), lv_color_hex(0x336688), 0);
                              }
                              if (id(drp5_pumpe)) {
                                lv_label_set_text(id(lbl_dr_pumpe_auto), "Pumpe 100%");
                                lv_obj_set_style_bg_color(id(btn_dr_pumpe_auto), lv_color_hex(0x1a5a8a), 0);
                              } else {
                                lv_label_set_text(id(lbl_dr_pumpe_auto), "Pumpe: manuell");
                                lv_obj_set_style_bg_color(id(btn_dr_pumpe_auto), lv_color_hex(0x555555), 0);
                              }
                              ESP_LOGI("drpreset", "DP5 geladen");
                        on_long_press:
                          - lambda: |-
                              id(drp5_rpm)      = id(dr_speed_rpm);
                              id(drp5_acc)      = id(dr_acc);
                              id(drp5_richtung) = id(dr_richtung);
                              id(drp5_mode)     = id(dr_motor_mode);
                              id(drp5_pumpe)    = id(dr_pumpe_auto);
                              char buf[28];
                              snprintf(buf, sizeof(buf), "%s:%d, A:%d, P:%s",
                                       id(drp5_richtung) > 0 ? "R" : "L",
                                       id(drp5_rpm), id(drp5_acc),
                                       id(drp5_pumpe) ? "ON" : "OFF");
                              lv_label_set_text(id(lbl_drp5_vals), buf);
                              ESP_LOGI("drpreset", "DP5 gespeichert");

