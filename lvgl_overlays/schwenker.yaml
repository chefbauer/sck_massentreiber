                              lv_label_set_text(id(lbl_preset2_vals), buf);
                              ESP_LOGI("preset","P2 gespeichert");
                    # P3
                    - button:
                        id: btn_preset3
                        width: 178
                        height: 80
                        align: LEFT_MID
                        x: 391
                        styles: style_preset_btn
                        widgets:
                          - label:
                              id: lbl_preset3_name
                              text: "③"
                              align: TOP_LEFT
                              x: 12
                              y: 8
                              text_font: font_preset_num
                              text_color: 0xFFFFFF
                          - label:
                              id: lbl_preset3_vals
                              text: "5.0s · 12 Upm · 100%"
                              align: BOTTOM_MID
                              y: -8
