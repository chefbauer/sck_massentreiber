                              id: lbl_preset5_vals
                              text: "5.0s · 20 Upm · 50%"
                              align: BOTTOM_MID
                              y: -8
                              text_font: font_small
                              text_color: 0xAABBFF
                        on_short_click:
                          - lambda: |-
                              id(sw_halbperiode_ms) = id(preset5_hp_ms);
                              id(sw_max_speed_rpm)  = id(preset5_rpm);
