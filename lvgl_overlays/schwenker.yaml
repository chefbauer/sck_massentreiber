obj:
  id: overlay_schwenker_settings
  width: 100%
  height: 100%
  bg_color: 0xFFFFFF
  bg_opa: 97%
  hidden: true
  clickable: true
  pad_all: 0
  scrollable: false
  widgets:
    # ── TabView: Schwenken / Drehen ────────────────────────
    - tabview:
        id: tabview_schwenker
        width: 1024
        height: 600
        align: TOP_LEFT
        x: 0
        y: 0
        scrollable: false
        scrollbar_mode: "off"
        tab_style:
          bg_color: 0xE8EEF8
          text_font: font_tab
          text_color: 0x003366
        on_value:
          - lambda: |-
              if (lv_tabview_get_tab_act(id(tabview_schwenker)) == 1) {
                id(dr_modus) = true;
                lv_label_set_text(id(lbl_motor_icon), "\xef\x8b\xb9");  // rotate-right (Drehen)
                id(script_drehen_settings_open).execute();
              } else {
                id(dr_modus) = false;
                lv_label_set_text(id(lbl_motor_icon), "\xef\x80\xa1");  // arrows-rotate (Schwenken)
              }
        tabs:
          # ══════════════════════════════════════════════════
          # Tab 1: Schwenken (unverändert)
          # ══════════════════════════════════════════════════
          - name: "Schwenken"
            id: tab_schwenken
            scrollable: false
            widgets:
              # ── Start/Stop Button ──────────────────────────────────────────
              - button:
                  id: btn_schwenker_overlay_toggle
                  width: 80
                  height: 55
                  align: TOP_LEFT
                  x: 10
                  y: 10
                  radius: 10
                  bg_color: 0x666666
                  styles: style_action_btn
                  on_press:
                    - lambda: |-
                        if (id(sw_aktiv)) {
                          id(script_schwenker_stop).execute();
                        } else {
                          id(script_schwenker_start).execute();
                        }
                  widgets:
                    - label:
                        id: lbl_overlay_schwenker_icon
                        align: CENTER
                        text: "\uF021"
                        text_font: font_icons
                        text_color: 0xFFFFFF

              # ── Arc 1: Schwenkzeit ─────────────────────────────────────────
              - obj:
                  id: arc_area_zeit
                  width: 320
                  height: 340
                  align: TOP_LEFT
                  x: 20
                  y: 80
                  styles: style_transp_container
                  scrollable: false
                  clickable: false
                  widgets:
                    - label:
                        text: "Schwenkzeit"
                        align: TOP_MID
                        y: 0
                        text_font: font_normal
                        text_color: 0x334455
                    - arc:
                        id: arc_schwenkzeit
                        width: 280
                        height: 280
                        align: TOP_MID
                        y: 35
                        min_value: 10      # = 1.0 s
                        max_value: 200     # = 20.0 s
                        value: 32          # = 3.2 s (default)
                        adjustable: true
                        arc_color: 0x2299FF
                        arc_width: 15
                        indicator:
                          arc_color: 0x55EEFF
                          arc_width: 15
                        knob:
                          bg_color: 0x55EEFF
                          width: 22
                          height: 22
                          radius: 11
                        on_value:
                          - lambda: |-
                              id(sw_halbperiode_ms) = (uint32_t)(x * 100);
                              char buf[8];
                              snprintf(buf, sizeof(buf), "%.1fs", x / 10.0f);
                              lv_label_set_text(id(lbl_arc_zeit_val), buf);
                    - label:
                        id: lbl_arc_zeit_val
                        text: "3.2s"
                        align: TOP_MID
                        y: 140
                        text_font: font_arc_val
                        text_color: 0x0077CC
                        text_align: CENTER

              # ── Arc 2: Beschleunigung (Trapez-Rampe %) ────────────────────
              - obj:
                  id: arc_area_acc
                  width: 320
                  height: 340
                  align: TOP_MID
                  x: 0
                  y: 80
                  styles: style_transp_container
                  scrollable: false
                  clickable: false
                  widgets:
                    - label:
                        text: "Beschleunigung"
                        align: TOP_MID
                        y: 0
                        text_font: font_normal
                        text_color: 0x334455
                    - arc:
                        id: arc_acc
                        width: 260
                        height: 260
                        align: TOP_MID
                        y: 40
                        min_value: 5
                        max_value: 100
                        value: 50
                        adjustable: true
                        arc_color: 0x885500
                        arc_width: 15
                        indicator:
                          arc_color: 0xFF9933
                          arc_width: 15
                        knob:
                          bg_color: 0xFF9933
                          width: 22
                          height: 22
                          radius: 11
                        on_value:
                          - lambda: |-
                              // Snap auf 5%-Schritte; 100%=acc_byte 254, nie 0/255 (= Ruck!)
                              int val = ((int)x / 5) * 5;
                              if (val < 5) val = 5;
                              id(sw_acc) = val;
                              // Nur snap-zurücksetzen wenn tatsächlich geründet (verhindert Rekursion)
                              if (val != (int)x) lv_arc_set_value(id(arc_acc), val);
                              char buf[6];
                              snprintf(buf, sizeof(buf), "%d%%", val);
                              lv_label_set_text(id(lbl_arc_acc_val), buf);
                    - label:
                        id: lbl_arc_acc_val
                        text: "50%"
                        align: TOP_MID
                        y: 148
                        text_font: font_arc_val
                        text_color: 0xCC7700
                        text_align: CENTER
                    - label:
                        id: lbl_trapez_shape
                        text: ""          # [VERALTET] war Sinus-Trapez-Visualisierung
                        hidden: true
                        align: TOP_MID
                        y: 210
                        text_font: font_normal
                        text_color: 0xFF9933
                        text_align: CENTER

              # ── Arc 3: Max RPM ─────────────────────────────────────────────
              - obj:
                  id: arc_area_rpm
                  width: 320
                  height: 340
                  align: TOP_RIGHT
                  x: -20
                  y: 80
                  styles: style_transp_container
                  scrollable: false
                  clickable: false
                  widgets:
                    - label:
                        text: "Max Umdrehungen"
                        align: TOP_MID
                        y: 0
                        text_font: font_normal
                        text_color: 0x334455
                    - arc:
                        id: arc_rpm
                        width: 280
                        height: 280
                        align: TOP_MID
                        y: 35
                        min_value: 1
                        max_value: 100
                        value: 15
                        adjustable: true
                        arc_color: 0x226622
                        arc_width: 15
                        indicator:
                          arc_color: 0x44FF88
                          arc_width: 15
                        knob:
                          bg_color: 0x44FF88
                          width: 22
                          height: 22
                          radius: 11
                        on_value:
                          - lambda: |-
                              id(sw_max_speed_rpm) = (int)x;
                              char buf[6];
                              snprintf(buf, sizeof(buf), "%d", (int)x);
                              lv_label_set_text(id(lbl_arc_rpm_val), buf);
                    - label:
                        id: lbl_arc_rpm_val
                        text: "4"
                        align: TOP_MID
                        y: 140
                        text_font: font_arc_val
                        text_color: 0x226644
                        text_align: CENTER
                    - label:
                        text: "Upm"
                        align: TOP_MID
                        y: 198
                        text_font: font_small
                        text_color: 0x556677

              # ── Preset-Buttons Schwenken (Short: laden, Long: speichern) ──
              - obj:
                  id: row_presets
                  width: 960
                  height: 90
                  align: BOTTOM_MID
                  y: -10
                  styles: style_transp_container
                  scrollable: false
                  widgets:
                    # P1
                    - button:
                        id: btn_preset1
                        width: 178
                        height: 80
                        align: LEFT_MID
                        x: 11
                        styles: style_preset_btn
                        widgets:
                          - label:
                              id: lbl_preset1_name
                              text: "①"
                              align: TOP_LEFT
                              x: 12
                              y: 8
                              text_font: font_preset_num
                              text_color: 0xFFFFFF
                          - label:
                              id: lbl_preset1_vals
                              text: "3.2s · 4 Upm · 100%"
                              align: BOTTOM_MID
                              y: -8
                              text_font: font_small
                              text_color: 0xAABBFF
                        on_short_click:
                          - lambda: |-
                              id(sw_halbperiode_ms) = id(preset1_hp_ms);
                              id(sw_max_speed_rpm)  = id(preset1_rpm);
                              id(sw_acc)            = id(preset1_acc);
                              lv_arc_set_value(id(arc_schwenkzeit), (int)(id(preset1_hp_ms)/100));
                              lv_arc_set_value(id(arc_rpm), id(preset1_rpm));
                              lv_arc_set_value(id(arc_acc), id(preset1_acc));
                              char b1[8]; snprintf(b1,sizeof(b1),"%.1fs",id(preset1_hp_ms)/1000.0f);
                              lv_label_set_text(id(lbl_arc_zeit_val), b1);
                              char b2[6]; snprintf(b2,sizeof(b2),"%d",id(preset1_rpm));
                              lv_label_set_text(id(lbl_arc_rpm_val), b2);
                              char b3[6]; snprintf(b3,sizeof(b3),"%d%%",id(preset1_acc));
                              lv_label_set_text(id(lbl_arc_acc_val), b3);
                              ESP_LOGI("preset","P1 geladen");
                        on_long_press:
                          - lambda: |-
                              id(preset1_hp_ms) = id(sw_halbperiode_ms);
                              id(preset1_rpm)   = id(sw_max_speed_rpm);
                              id(preset1_acc)   = id(sw_acc);
                              char buf[28];
                              snprintf(buf,sizeof(buf),"%.1fs \xc2\xb7 %d Upm \xc2\xb7 %d%%",
                                       id(preset1_hp_ms)/1000.0f,id(preset1_rpm),id(preset1_acc));
                              lv_label_set_text(id(lbl_preset1_vals), buf);
                              ESP_LOGI("preset","P1 gespeichert");
                    # P2
