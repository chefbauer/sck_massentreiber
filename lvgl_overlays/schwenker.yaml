                              id(sw_max_speed_rpm)  = id(preset3_rpm);
                              id(sw_acc)            = id(preset3_acc);
                              lv_arc_set_value(id(arc_schwenkzeit), (int)(id(preset3_hp_ms)/100));
                              lv_arc_set_value(id(arc_rpm), id(preset3_rpm));
                              lv_arc_set_value(id(arc_acc), id(preset3_acc));
                              char b1[8]; snprintf(b1,sizeof(b1),"%.1fs",id(preset3_hp_ms)/1000.0f);
                              lv_label_set_text(id(lbl_arc_zeit_val), b1);
                              char b2[6]; snprintf(b2,sizeof(b2),"%d",id(preset3_rpm));
                              lv_label_set_text(id(lbl_arc_rpm_val), b2);
                              char b3[6]; snprintf(b3,sizeof(b3),"%d%%",id(preset3_acc));
                              lv_label_set_text(id(lbl_arc_acc_val), b3);
                              ESP_LOGI("preset","P3 geladen");
                        on_long_press:
                          - lambda: |-
                              id(preset3_hp_ms) = id(sw_halbperiode_ms);
                              id(preset3_rpm)   = id(sw_max_speed_rpm);
                              id(preset3_acc)   = id(sw_acc);
                              char buf[28];
                              snprintf(buf,sizeof(buf),"%.1fs \xc2\xb7 %d Upm \xc2\xb7 %d%%",
                                       id(preset3_hp_ms)/1000.0f,id(preset3_rpm),id(preset3_acc));
                              lv_label_set_text(id(lbl_preset3_vals), buf);
                              ESP_LOGI("preset","P3 gespeichert");
                    # P4
                    - button:
                        id: btn_preset4
                        width: 178
                        height: 80
                        align: LEFT_MID
                        x: 581
                        styles: style_preset_btn
                        widgets:
                          - label:
                              id: lbl_preset4_name
                              text: "④"
                              align: TOP_LEFT
                              x: 12
                              y: 8
                              text_font: font_preset_num
                              text_color: 0xFFFFFF
                          - label:
                              id: lbl_preset4_vals
                              text: "3.0s · 6 Upm · 75%"
                              align: BOTTOM_MID
