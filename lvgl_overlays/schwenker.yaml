          # ══════════════════════════════════════════════════
          # Tab 2: Drehen – reiner Motorbetrieb
          # ══════════════════════════════════════════════════
          - name: "Drehen"
            id: tab_drehen
            scrollable: false
            widgets:
              # ── Start/Stop Button ──────────────────────────────────────────
              - button:
                  id: btn_dr_start_stop
                  width: 80
                  height: 55
                  align: TOP_LEFT
                  x: 10
                  y: 10
                  radius: 10
                  bg_color: 0x666666
                  styles: style_action_btn
                  on_press:
                    - lambda: |-
                        if (id(dr_aktiv)) {
                          id(script_drehen_stop).execute();
                        } else {
                          id(script_drehen_start).execute();
                        }
                  widgets:
                    - label:
                        align: CENTER
                        text: "\uF021"
                        text_font: font_icons
                        text_color: 0xFFFFFF

              # ── Pumpen-Auto-Button (EIN = 100% beim Drehen, AUS = manuell) ──
              - button:
                  id: btn_dr_pumpe_auto
                  width: 180
                  height: 55
                  align: TOP_LEFT
                  x: 100
                  y: 10
                  radius: 10
                  bg_color: 0x1a5a8a
                  styles: style_action_btn
                  on_press:
                    - lambda: |-
                        id(dr_pumpe_auto) = !id(dr_pumpe_auto);
                        if (id(dr_pumpe_auto)) {
                          lv_label_set_text(id(lbl_dr_pumpe_auto), "Pumpe 100%");
                          lv_obj_set_style_bg_color(id(btn_dr_pumpe_auto), lv_color_hex(0x1a5a8a), 0);
                          // Wenn Drehmodus gerade aktiv: Pumpe sofort auf 100%
                          if (id(dr_aktiv) && id(pumpe_a_aktiv)) {
                            if (id(pumpe_vor_drehen_level) < 0.0f) {
                              id(pumpe_vor_drehen_level) = lv_slider_get_value(id(slider_turmpumpe)) / 100.0f;
                            }
                            id(output_pumpe_dacA).set_level(1.0f);
                            ESP_LOGI("drehen", "Pumpen-Auto EIN: 100%%");
                          }
                        } else {
                          lv_label_set_text(id(lbl_dr_pumpe_auto), "Pumpe: manuell");
                          lv_obj_set_style_bg_color(id(btn_dr_pumpe_auto), lv_color_hex(0x555555), 0);
                          // Pumpe zurück auf gespeicherten Level falls Drehen läuft
                          if (id(dr_aktiv) && id(pumpe_vor_drehen_level) >= 0.0f) {
                            id(output_pumpe_dacA).set_level(id(pumpe_vor_drehen_level));
                            lv_slider_set_value(id(slider_turmpumpe),
                              (int)(id(pumpe_vor_drehen_level)*100.0f+0.5f), LV_ANIM_OFF);
                            id(pumpe_vor_drehen_level) = -1.0f;
                            ESP_LOGI("drehen", "Pumpen-Auto AUS: zurück auf manuell");
                          }
                        }
                  widgets:
                    - label:
                        id: lbl_dr_pumpe_auto
                        align: CENTER
                        text: "Pumpe 100%"
                        text_font: font_small
                        text_color: 0xFFFFFF

              # ── Arc: Geschwindigkeit 5–400 UPM (links) ────────────────────
              - obj:
                  id: arc_dr_area_rpm
                  width: 300
                  height: 315
                  align: TOP_LEFT
                  x: 20
                  y: 80
                  styles: style_transp_container
                  scrollable: false
                  clickable: false
                  widgets:
                    - label:
                        text: "Geschwindigkeit"
                        align: TOP_MID
                        y: 0
                        text_font: font_normal
                        text_color: 0x334455
                    - arc:
                        id: arc_dr_rpm
                        width: 260
                        height: 260
                        align: TOP_MID
                        y: 35
                        min_value: 1
                        max_value: 150
                        value: 30
                        adjustable: true
                        arc_color: 0x226622
                        arc_width: 15
                        indicator:
                          arc_color: 0x44FF88
                          arc_width: 15
                        knob:
                          bg_color: 0x44FF88
                          width: 22
                          height: 22
                          radius: 11
                        on_value:
                          - lambda: |-
                              id(dr_speed_rpm) = (int)x;
                              char buf[8];
                              snprintf(buf, sizeof(buf), "%d", (int)x);
                              lv_label_set_text(id(lbl_dr_rpm_val), buf);
                              // Rampzeit neu berechnen und anzeigen
                              float rt = (float)((int)x * 8) * (256 - id(dr_acc)) * 0.00005f;
                              char rbuf[10]; snprintf(rbuf, sizeof(rbuf), "%.1fs", rt);
                              lv_label_set_text(id(lbl_dr_ramp_info), rbuf);
                              // Live-Update: sofort an Motor senden wenn Drehmodus aktiv
                              if (id(dr_aktiv)) {
                                int speed_val = (int)x * 8;
                                uint8_t acc_b = (uint8_t)std::max(1, std::min(254, id(dr_acc)));
                                int dr_dir    = (id(dr_richtung) > 0) ? 1 : 0;
                                id(can_bus)->send_data(${motor_can_id}, false,
                                    gen_data_can_motor_set_speed(${motor_can_id}, dr_dir, speed_val, acc_b));
                                ESP_LOGI("drehen", "Live-UPM: %d (F6=%d)", (int)x, speed_val);
                              }
