        text: "30\xb0C"
        text_font: font_small
        text_color: 0x888888
        align: TOP_LEFT
        x: 4
        y: 57
    - label:
        text: "25\xb0C"
        text_font: font_small
        text_color: 0x888888
        align: TOP_LEFT
        x: 4
        y: 107
    - label:
