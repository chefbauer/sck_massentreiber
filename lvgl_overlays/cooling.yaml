obj:
  id: overlay_cooling
  width: 100%
  height: 100%
  bg_color: 0x111111
  bg_opa: 92%
  hidden: true
  clickable: true
  scrollable: false
  pad_all: 0
  widgets:
    # ── Titel ─────────────────────────────────────────────────────────────────
    - label:
        text: "Becken – 2h Verlauf"
        text_font: font_normal
        text_color: 0xFFFFFF
        align: TOP_MID
        y: 14

    # Exit-Button rechts oben
    - button:
        id: btn_cooling_exit
        width: 80
        height: 60
        align: TOP_RIGHT
        x: -10
        y: 10
        bg_color: 0xCC3333
        widgets:
          - label:
              text: "X"
              align: CENTER
              text_font: font_normal
              text_color: 0xFFFFFF
        on_click:
          - lvgl.widget.hide: overlay_cooling
          - lambda: id(kuehl_chart_visible) = false;

    # ── Legende ───────────────────────────────────────────────────────────────
    - obj:
        width: 12
        height: 12
        radius: 6
        align: TOP_LEFT
        x: 70
        y: 18
        bg_color: 0x44BBFF
        bg_opa: COVER
        border_width: 0
        scrollable: false
    - label:
        text: "Temperatur"
        text_font: font_small
        text_color: 0x0077CC
        align: TOP_LEFT
        x: 88
        y: 14
    - obj:
        width: 12
        height: 12
        radius: 6
        align: TOP_LEFT
        x: 200
        y: 18
        bg_color: 0x00CC44
        bg_opa: COVER
        border_width: 0
        scrollable: false
    - label:
        text: "Kompressor"
        text_font: font_small
        text_color: 0x00CC44
        align: TOP_LEFT
        x: 218
        y: 14

    # ── Chart-Hintergrund (x=70..910, y=65..465, 840x400px) ──────────────────
    # Y: y = 65 + (300 - val),  val = temp*10, range -100..300 (-10..30°C)
    # X: px = 70 + i*840/(count-1), 720 Punkte = 2h bei 10s-Intervall
    - obj:
        id: chart_bg
        width: 840
        height: 400
        align: TOP_LEFT
        x: 70
        y: 65
        bg_color: 0xFFFFFF
        bg_opa: COVER
        radius: 4
        border_color: 0x555555
        border_width: 1
        pad_all: 0
        scrollable: false

    # ── Y-Achsen-Labels (x=4, y = grid_y - 8) ────────────────────────────────
