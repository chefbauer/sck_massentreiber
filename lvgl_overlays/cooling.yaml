    - line:
        id: line_temp_trace
        align: TOP_LEFT
        x: 0
        y: 0
        points:
          - x: 70
            y: 365
        line_color: 0x0077CC
        line_width: 3
        line_rounded: true

    # ── Dynamische Kompressor-Linie (grün 6px) ────────────────────────────────
