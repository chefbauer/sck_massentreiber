obj:
  id: overlay_timer_cowntdown
  width: 100%
  height: 100%
  align: CENTER
  bg_color: 0xFFFFFF
  bg_opa: 97%
  border_width: 0
  pad_all: 0
  hidden: true

  widgets:
    # ── Schließen-Button (oben rechts) ─────────────────────────────
    - button:
        id: btn_tc_exit
        width: 80
        height: 60
        align: TOP_RIGHT
        x: -10
        y: 10
        bg_color: 0xCC3333
        radius: 8
        border_width: 0
        on_click:
          - lambda: |-
              lv_obj_add_flag(id(overlay_timer_cowntdown), LV_OBJ_FLAG_HIDDEN);
        widgets:
          - label:
              text: "X"
              align: CENTER
              text_font: font_normal
              text_color: 0xFFFFFF

    # ── Titel ───────────────────────────────────────────────────────
    - label:
        id: lbl_tc_title
        text: "Timer / Countdown"
        align: TOP_MID
        y: 12
        text_font: font_title
        text_color: 0x003366

    # ── Slot-Auswahl-Zeile (7 Buttons: Slot 1–6 + Alle) ────────────
    # Inaktiv: weißer Hintergrund, farbiger Rand (4px); Aktiv: Vollfarbe
