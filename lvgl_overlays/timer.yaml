        id: obj_tc_slot_row
        width: 800
        height: 70
        align: TOP_MID
        y: 90
        bg_opa: 0%
        border_width: 0
        pad_all: 0

        widgets:
          - button:
              id: btn_tc_s1
              width: 80
              height: 56
              align: LEFT_MID
              x: 86
              bg_color: 0xFFFFFF
              bg_opa: COVER
              border_color: 0xFF0000
              border_width: 4
              radius: 8
              on_click:
                - lambda: |-
                    id(overlay_tc_mask) ^= (1 << 0);
                    bool on = id(overlay_tc_mask) & (1<<0);
                    lv_obj_set_style_bg_color(id(btn_tc_s1), lv_color_hex(on ? 0xFF0000 : 0xFFFFFF), 0);
                    lv_obj_set_style_text_color(lv_obj_get_child(id(btn_tc_s1), 0), lv_color_hex(on ? 0xFFFFFF : 0xCC0000), 0);
              widgets:
                - label:
                    text: "1"
                    align: CENTER
                    text_font: font_normal
                    text_color: 0xCC0000
