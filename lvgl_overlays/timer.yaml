    # ── Timer-Inhalt ─────────────────────────────────────────────────
    - obj:
        id: obj_tc_timer_content
        width: 700
        height: 100
        align: TOP_MID
        y: 302
        bg_opa: 0%
        border_width: 0
        pad_all: 0

        widgets:
          - button:
              id: btn_tc_reset
              width: 280
              height: 56
              align: CENTER
              bg_color: 0x336633
              border_color: 0x55AA55
              border_width: 2
              radius: 8
              on_click:
                - lambda: |-
                    // Reset: Slot auf 0, mode=Timer, KEIN Autostart, Overlay bleibt offen
                    esphome::binary_sensor::BinarySensor* blink_s[6] = {
                      id(bin_slot1_blink), id(bin_slot2_blink), id(bin_slot3_blink),
                      id(bin_slot4_blink), id(bin_slot5_blink), id(bin_slot6_blink),
                    };
                    const uint32_t slot_fc[6] = {0xFF0000,0xFFFF00,0x00FF00,0x00FFFF,0x0000FF,0xFF00FF};
                    lv_obj_t* slot_tabs[6] = {
                      id(slot1_tab),id(slot2_tab),id(slot3_tab),
                      id(slot4_tab),id(slot5_tab),id(slot6_tab),
                    };
                    for (int i = 0; i < 6; i++) {
                      if (!(id(overlay_tc_mask) & (1 << i))) continue;
                      id(slot_elapsed_ms)[i]   = 0;
                      id(slot_start_ms)[i]     = 0;
                      id(slot_status)[i]       = 0;
                      id(slot_is_countdown)[i] = false;
                      blink_s[i]->publish_state(false);
                      lv_obj_set_style_bg_color(slot_tabs[i], lv_color_hex(slot_fc[i]), 0);
                    }
                    // Tabs → Timer
                    id(overlay_tc_type) = 0;
                    lv_obj_set_style_bg_color(id(btn_tc_type_timer), lv_color_hex(0x334488), 0);
                    lv_obj_set_style_bg_color(id(btn_tc_type_cd),    lv_color_hex(0xCCCCCC), 0);
                    lv_obj_set_style_text_color(lv_obj_get_child(id(btn_tc_type_timer), 0), lv_color_hex(0xFFFFFF), 0);
                    lv_obj_set_style_text_color(lv_obj_get_child(id(btn_tc_type_cd), 0),    lv_color_hex(0x333333), 0);
                    lv_obj_clear_flag(id(obj_tc_timer_content), LV_OBJ_FLAG_HIDDEN);
                    lv_obj_add_flag(id(obj_tc_cd_content),    LV_OBJ_FLAG_HIDDEN);
                    lv_obj_add_flag(id(overlay_timer_cowntdown), LV_OBJ_FLAG_HIDDEN);
              widgets:
                - label:
                    text: "Timer Reset"
                    align: CENTER
                    text_font: font_normal
                    text_color: 0xFFFFFF

    # ── Countdown-Inhalt ─────────────────────────────────────────────
    - obj:
        id: obj_tc_cd_content
        width: 860
        height: 170
        align: TOP_MID
        y: 302
        bg_opa: 0%
        border_width: 0
        pad_all: 0
        hidden: true

        widgets:
          # Slider + Wert-Label nebeneinander in einer Zeile
          - slider:
              id: slider_tc_minutes
              width: 680
              height: 24
              align: TOP_LEFT
              x: 0
              y: 8
              min_value: 30
              max_value: 720
              value: 240
              on_value:
                - lambda: |-
                    // Guard gegen rekursiven Aufruf (lv_slider_set_value → on_value → ...)
                    static bool in_snap = false;
                    if (in_snap) return;
                    int raw = (int)x;
                    int snapped = ((raw + 15) / 30) * 30;
                    if (snapped < 30)  snapped = 30;
                    if (snapped > 720) snapped = 720;
                    id(overlay_tc_seconds) = snapped;
                    if (raw != snapped) {
                      in_snap = true;
                      lv_slider_set_value(id(slider_tc_minutes), snapped, LV_ANIM_OFF);
                      in_snap = false;
                    }
                    int m = snapped / 60, s2 = snapped % 60;
                    char buf[24];
                    if (m == 0)       snprintf(buf, sizeof(buf), "%d sek", s2);
                    else if (s2 == 0) snprintf(buf, sizeof(buf), "%d min", m);
                    else              snprintf(buf, sizeof(buf), "%d:%02d", m, s2);
                    lv_label_set_text(id(lbl_tc_minutes_val), buf);
          - label:
              id: lbl_tc_minutes_val
              text: "4 min"
              align: TOP_LEFT
              x: 692
              y: 6
              text_font: font_normal
              text_color: 0x003366
          # Quick-Buttons 1–10 min
