                - lambda: |-
                    bool all_on = (id(overlay_tc_mask) & 0x3F) == 0x3F;
                    id(overlay_tc_mask) = all_on ? 0 : 0x3F;
                    const uint32_t fc[6]     = {0xFF0000,0xFFFF00,0x00FF00,0x00FFFF,0x0000FF,0xFF00FF};
                    const uint32_t tc_on[6]  = {0xFFFFFF,0x111111,0x111111,0x111111,0xFFFFFF,0xFFFFFF};
                    const uint32_t tc_off[6] = {0xCC0000,0x777700,0x006600,0x007777,0x0000CC,0xAA00AA};
                    lv_obj_t* btns[6] = {id(btn_tc_s1),id(btn_tc_s2),id(btn_tc_s3),id(btn_tc_s4),id(btn_tc_s5),id(btn_tc_s6)};
