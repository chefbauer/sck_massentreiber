                      bool on = id(overlay_tc_mask) & (1 << i);
                      lv_obj_set_style_bg_color(btns[i], lv_color_hex(on ? fc[i] : 0xFFFFFF), 0);
                      lv_obj_set_style_text_color(lv_obj_get_child(btns[i], 0), lv_color_hex(on ? tc_on[i] : tc_off[i]), 0);
