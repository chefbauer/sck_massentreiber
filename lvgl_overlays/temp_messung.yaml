                    float e = t[id(global_mat_type)][1];
                    id(global_emissivity) = e;
                    lv_slider_set_value(id(slider_emissivity),(int)(e*100.0f+0.5f),LV_ANIM_ON);
                    lv_label_set_text_fmt(id(lbl_emissivity_val),"%.2f",e);
          # 2 = Dunkelblau
          - button:
              id: btn_col_2
              width: 50
              height: 50
              align: LEFT_MID
              x: 499
              bg_color: 0x1A3A99
              radius: 25
              border_width: 0
              on_click:
                - lambda: |-
                    id(global_mat_color) = 2;
                    static const float t[3][6] = {{0.93f,0.92f,0.91f,0.90f,0.89f,0.87f},{0.94f,0.90f,0.86f,0.82f,0.78f,0.25f},{0.09f,0.08f,0.07f,0.06f,0.05f,0.04f}};
                    float e = t[id(global_mat_type)][2];
                    id(global_emissivity) = e;
                    lv_slider_set_value(id(slider_emissivity),(int)(e*100.0f+0.5f),LV_ANIM_ON);
                    lv_label_set_text_fmt(id(lbl_emissivity_val),"%.2f",e);
          # 3 = Rot/Orange
          - button:
              id: btn_col_3
              width: 50
              height: 50
              align: LEFT_MID
              x: 557
              bg_color: 0xCC4400
              radius: 25
              border_width: 0
              on_click:
                - lambda: |-
                    id(global_mat_color) = 3;
                    static const float t[3][6] = {{0.93f,0.92f,0.91f,0.90f,0.89f,0.87f},{0.94f,0.90f,0.86f,0.82f,0.78f,0.25f},{0.09f,0.08f,0.07f,0.06f,0.05f,0.04f}};
                    float e = t[id(global_mat_type)][3];
                    id(global_emissivity) = e;
                    lv_slider_set_value(id(slider_emissivity),(int)(e*100.0f+0.5f),LV_ANIM_ON);
                    lv_label_set_text_fmt(id(lbl_emissivity_val),"%.2f",e);
          # 4 = Weiß/Hell
          - button:
              id: btn_col_4
              width: 50
              height: 50
              align: LEFT_MID
              x: 615
              bg_color: 0xDDDDDD
              radius: 25
              border_width: 0
              on_click:
                - lambda: |-
                    id(global_mat_color) = 4;
                    static const float t[3][6] = {{0.93f,0.92f,0.91f,0.90f,0.89f,0.87f},{0.94f,0.90f,0.86f,0.82f,0.78f,0.25f},{0.09f,0.08f,0.07f,0.06f,0.05f,0.04f}};
                    float e = t[id(global_mat_type)][4];
                    id(global_emissivity) = e;
                    lv_slider_set_value(id(slider_emissivity),(int)(e*100.0f+0.5f),LV_ANIM_ON);
                    lv_label_set_text_fmt(id(lbl_emissivity_val),"%.2f",e);
          # 5 = Silber/Metallic
          - button:
              id: btn_col_5
              width: 50
              height: 50
              align: LEFT_MID
              x: 673
              bg_color: 0xAAAAAA
              radius: 25
              border_color: 0x888888
              border_width: 2
              on_click:
                - lambda: |-
