                                  text_color: 0x000000
                              - label:
                                  text: "weich"
                                  align: LEFT_MID
                                  x: 190
                                  text_font: font_small
                                  text_color: 0x888888
                              - label:
                                  text: "hart"
                                  align: RIGHT_MID
