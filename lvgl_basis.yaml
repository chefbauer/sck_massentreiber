                id: slot6_running_view
                bg_image_src: img_countdown_bg
          else:
            - lvgl.widget.update:
                id: slot6_running_view
                bg_image_src: img_stopwatch_bg
lvgl:
  log_level: WARN
  color_depth: 16

  style_definitions:
    # Aktions-Button: volle BG-Deckkraft, keine Border/Shadow/Outline/Padding
    - id: style_action_btn
      bg_opa: COVER
      border_width: 0
      shadow_width: 0
      outline_width: 0
      pad_all: 0
    # Slot-Tab-Button: wie style_action_btn, aber zusätzlich radius: 0
    - id: style_slot_tab
      bg_opa: COVER
      border_width: 0
      shadow_width: 0
      outline_width: 0
      radius: 0
      pad_all: 0
    # Unsichtbarer Touch-Button: transparente Fläche ohne jede Dekoration
    - id: style_invis_btn
      bg_opa: 0%
      border_width: 0
      shadow_width: 0
      outline_width: 0
      radius: 0
      pad_all: 0
    # Transparenter Layout-Container: kein BG, keine Border, kein Padding
    - id: style_transp_container
      bg_opa: TRANSP
      border_width: 0
      pad_all: 0
    # Sensor-Badge: runde Ecken, keine Border
    - id: style_sensor_badge
      radius: 8
      border_width: 0
    # Preset-Button: dunkelblau mit blauem Rand
    - id: style_preset_btn
      bg_color: 0x223355
      border_width: 2
      border_color: 0x4477AA
      radius: 12
    # Timer-Bereichs-Button (Slots 2–6): 40% Deckkraft, keine Dekoration, linkes Padding
    - id: style_timer_area_btn
      bg_opa: 40%
      border_width: 0
      shadow_width: 0
      outline_width: 0
      radius: 0
      pad_left: 12
      pad_top: 0
      pad_right: 0
      pad_bottom: 0

  # Farbdefinitionen (Helles Design)
  theme:
    obj:
      bg_color: 0xFFFFFF  # Weiß
      text_color: 0x000000  # Schwarz

  # Pages/Screens Definition
  pages:
    # ================================
    # PAGE 1: Hauptseite / Start
    # ================================
    - id: page_main
      widgets:
        # Haupt-Container
        - obj:
            id: main_container
            width: 1024
            height: 600
            bg_color: 0xFFFFFF  # Weiß
            bg_opa: COVER
            scrollable: false
            scrollbar_mode: "off"
            pad_all: 0
            widgets:
              # Titel oben mittig
              - label:
                  id: main_title
                  text: "SCK Schwippschwenker"
                  align: TOP_MID
                  y: 20
                  text_font: font_title
                  text_color: 0x003366  # Dunkelblau
                  text_align: CENTER

              # Not-Aus Button oben links
              - button:
                  id: btn_stop_notaus
                  width: 80
                  height: 80
                  align: TOP_LEFT
                  x: 10
                  y: 10
                  radius: 8
                  bg_color: 0xCC0000
                  styles: style_action_btn
                  on_click:
                    - lambda: |-
                        id(script_system_aus).execute();
                  widgets:
                    - label:
                        align: CENTER
                        text: "Not-\nAus"
                        text_font: font_tab
                        text_color: 0xFFFFFF
                        text_align: CENTER

              # System-Schalter rechts oben: Long Press = EIN/AUS toggle (nur Climate)
              # Short Press: keine Funktion mehr (dafür gibts den STOP-Button links)
              - button:
                  id: btn_system_power
                  width: 80
                  height: 80
                  align: TOP_RIGHT
                  x: -10
                  y: 10
                  radius: 40
                  bg_color: 0xAA2200
                  styles: style_action_btn
                  on_long_press:
                    - lambda: |-
                        if (id(system_ein)) {
                          id(script_system_aus).execute();
                        } else {
                          id(script_system_ein).execute();
                        }
                  widgets:
                    - label:
                        id: lbl_power_icon
                        align: CENTER
                        text: "\uF011"
                        text_font: font_icons
                        text_color: 0xFFFFFF
              
              # Auto-Motor-Button (rund, tangential 45° links oben am Ring)
              # AN (auto_motorbetrieb=true):  grüner BG 0x00FF00, Pfeil+A weiß
              # AUS (auto_motorbetrieb=false): dunkelgrauer BG, Pfeil hellgrau, A dunkelgrau
              # Short: Toggle AN ↔ AUS
              - button:
                  id: btn_auto_motorbetrieb
                  width: 80
                  height: 80
                  align: CENTER
                  x: -156
                  y: -136
                  radius: 40
                  bg_color: 0x00FF00
                  styles: style_action_btn
                  on_short_click:
                    - lambda: |-
                        id(auto_motorbetrieb) = !id(auto_motorbetrieb);
                        if (id(auto_motorbetrieb)) {
                          lv_obj_set_style_bg_color(id(btn_auto_motorbetrieb), lv_color_hex(0x00FF00), 0);
                          lv_obj_set_style_text_color(id(lbl_auto_motorbetrieb_icon), lv_color_hex(0xFFFFFF), 0);
                          lv_obj_set_style_text_color(id(lbl_auto_motorbetrieb_a), lv_color_hex(0xFFFFFF), 0);
                        } else {
                          lv_obj_set_style_bg_color(id(btn_auto_motorbetrieb), lv_color_hex(0x444444), 0);
                          lv_obj_set_style_text_color(id(lbl_auto_motorbetrieb_icon), lv_color_hex(0xAAAAAA), 0);
                          lv_obj_set_style_text_color(id(lbl_auto_motorbetrieb_a), lv_color_hex(0xAAAAAA), 0);
                        }
                  widgets:
                    - label:  # Dreh-Icon: ~30% größer als Standard (52px), weiß (AN) / hellgrau (AUS)
                        id: lbl_auto_motorbetrieb_icon
                        align: CENTER
                        text: "\uF021"
                        text_font: font_icons_md
                        text_color: 0xFFFFFF
                    - label:  # A-Overlay: ~30% größer (36px), passt in Drehsymbol, weiß (AN) / dunkelgrau (AUS)
                        id: lbl_auto_motorbetrieb_a
                        align: CENTER
                        text: "A"
                        text_font: font_auto_a
                        text_color: 0xFFFFFF

              # Beckenfüllungs-Button (rund, tangential 45° rechts unten am Ring)
              # Modi: 0=AUS(grau), 1=MANUELL(blau), 2=AUTO(grün)
              # Short: Cycle AUS→MANUELL→AUTO→AUS
              # Long:  TURBO (dann zurück zum vorherigen Modus)
              - button:
                  id: btn_beckenfuellung
                  width: 80
                  height: 80
                  align: CENTER
                  x: 156
                  y: 176
                  radius: 40
                  bg_color: 0x1a7a3a
                  styles: style_action_btn
                  on_short_click:
                    - lambda: |-
                        // Cycle: 0→1→2→0
                        int naechster = (id(pumpe_a_modus) + 1) % 3;
                        id(script_beckenpumpe_set_modus)->execute(naechster);
                  on_long_press:
                    - lambda: |-
