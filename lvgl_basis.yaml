                                  text_color: 0x99AACC
                            on_click:
                              - script.execute: script_schwenker_settings_open

                        # Zeile: Motor-Steuerung
                        - obj:
                            id: row_motor_controls
                            width: 960
                            height: 70
                            align: TOP_MID
                            y: 90
                            bg_opa: TRANSP
                            border_width: 0
                            scrollable: false
                            scrollbar_mode: "off"
                            widgets:
                              - label:
                                  text: "Motor:"
                                  align: LEFT_MID
