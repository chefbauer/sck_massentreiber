                                  width: 220
                                  height: 60
                                  align: LEFT_MID
                                  x: 200
                                  bg_color: 0x884422
                                  widgets:
                                    - label:
                                        text: "Motor Reboot"
                                        align: CENTER
                                        text_font: font_normal
                                        text_color: 0xFFFFFF
                                  on_click:
                                    - script.execute: script_motor_reboot

                        # Build-Nummer (zum Verifizieren ob neue Firmware aktiv ist)
                        - label:
                            id: lbl_build_number
                            text: "Build: 20260317-002"
                            align: BOTTOM_RIGHT
                            x: -20
                            y: -15
                            text_font: font_small
                            text_color: 0xAAAAAA

                    # Tab 2: Schwenker
                    - name: "Schwenker"
                      id: tab_schwenker
