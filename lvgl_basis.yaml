# ================================
# LVGL Display Configuration Package
# Display Drehwurm - Basis Konfiguration
# Display: 1024x600 Pixel
#
# Diese Datei wird als Package importiert:
# packages:
#   lvgl_config: !include lvgl_basis.yaml
# ================================
# ── Komponenten ──────────────────────────────────────────────────────────────────
#  font:      font_title, font_normal, font_preset_num, font_tab, font_small,
#             font_clock, font_default_40px (Roboto 40px, ehem. font_temp),
#             font_icons, font_timer (digital-7_mono 60px),
#             font_arc_val, font_icon_xl, font_icons_md, font_auto_a,
#             font_icon_ts, font_cd_btn, font_ts_xl
#
#  image:     img_stopwatch (60x60), img_countdown (60x60)          – Default-Ansicht Buttons
#             img_stopwatch_bg (120x120), img_countdown_bg (120x120) – BG-Symbol running_view
#             Quelle: graphics/stopwatch_23f1.svg, graphics/cowntdown_23f3.svg
#             BG-Widgets: img_bg1..img_bg6 (je 1 Widget, Quelle per lv_image_set_src getauscht)
#
#  globals:   slot_start_ms, slot_elapsed_ms, slot_status,
#             slot_is_countdown, slot_countdown_max_ms,
#             overlay_cd_slot, overlay_cd_mode, overlay_cd_selected_min,
#             brightness_auto_mode, brightness_auto_updating,
#             led_auto_brightness, led_auto_updating,
#             system_ein, global_leds_per_slot
#
#  binary_sensor: bin_slot1_blink .. bin_slot6_blink  (template, internal)
#
#  script:    script_open_countdown_overlay, script_slot_start, script_slot_stop,
#             script_slot_pause_resume, set_countdown_secs
#
#  interval:  500ms – Timer/Countdown-Anzeige, Blink, BG-Symbol-Umschaltung,
#                     AMG8833-Overlay, Uhrzeit/Datum, Auto-Stop Schwenker+Drehen
#             10s   – LVGL-Idle
#
#  lvgl:      page_main, page_settings
#             Slot-Container: slot1_red..slot6_..  (je 120px hoch)
#               – Default-Ansicht: img_stopwatch / img_countdown Buttons (60px SVG)
#               – Running-Ansicht: BG-Symbol 120px 60% opa (x:-26), Timer font_timer 60px
#                 lbl_slotX_time: align CENTER x:0 y:0
# ─────────────────────────────────────────────────────────────────────────────────

# Font Definitionen (Top-Level, nicht unter lvgl!)
font:
  - file: "gfonts://Roboto@700"
    id: font_title
    size: 60
    bpp: 4
    glyphs: " -/CEKOPSTacdeghiklmnoprstuwx"  # Timer/Cowntdown + Sensor-Phalanx + Schwenker Einstellungen + STOP

  - file: "gfonts://Roboto@400"
    id: font_normal
    size: 28
    bpp: 4
    glyphs: " !\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyzäöüÄÖÜß{|}~°·–"

  - file: "gfonts://Noto+Sans+Symbols@400"
    id: font_preset_num
    size: 28
    bpp: 4
    glyphs: "①②③④⑤"

  - file: "gfonts://Roboto@400"
    id: font_tab
    size: 30
    bpp: 4
    glyphs: " !\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyzäöüÄÖÜß{|}~°"

  - file: "gfonts://Roboto@700"
    id: font_small
    size: 18
    bpp: 4
    glyphs: " !\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyzäöüÄÖÜß{|}~°·–"

  # Uhrzeit-Font (Statusleiste hh:mm:ss)
  - file: "gfonts://Roboto@400"
    id: font_clock
    size: 22
    bpp: 4
    glyphs: "0123456789:- ,.DFMSaceghimnorstw"

  # Temperatur-Font (Statusleiste, gleiche Größe wie Schneeflocken-Symbol)
  - file: "gfonts://Roboto@400"
    id: font_default_40px
    size: 40
    bpp: 4
    glyphs: "0123456789.-°CW"

  # Symbol-Font – Font Awesome Solid (Play/Pause/Schneeflocke/Einstellungen)
  - file: "https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/webfonts/fa-solid-900.ttf"
    id: font_icons
    size: 40
    bpp: 4
    glyphs:
      - "\uF04B"  # Play
      - "\uF04C"  # Pause
      - "\uF2DC"  # Schneeflocke
      - "\uF013"  # Zahnrad (Einstellungen)
      - "\uF545"  # Ruler (ToF Distanz)
      - "\uF2C9"  # Thermometer-half (Temperatur)
      - "\uF043"  # Droplet (Luftfeuchtigkeit)
      - "\uF72E"  # Wind (Luftdruck)
      - "\uF6FC"  # Mountain (Höhe)
      - "\uF185"  # Sun (Licht)
      - "\uF05B"  # Crosshairs / Laser (IR)
      - "\uF011"  # Power (Ein/Aus)
      - "\uF773"  # Water (Beckenfüllung)
      - "\uF021"  # arrows-rotate (Schwenker Start/Stop)
      - "\uF186"  # Moon (Standby)
      - "\uF00D"  # xmark (X-Button)
      - "\uF72F"  # wine-bottle (Kühl-Saldo Getränkesymbol)
      - "\uF2F2"  # stopwatch (Stoppuhr)
      - "\uF252"  # hourglass-half (Countdown/Sanduhr)
      - "\ue516"  # jar (fa-jar, FA6 v6.0, Dose/Konserve, cd_mini Reihen-Icon)

  # Digital-7 Mono Font für Timer-Anzeige
  - file: "fonts/digital-7_mono.ttf"
    id: font_timer
    size: 60
    bpp: 4
    glyphs: "0123456789: "

  # Arc-Wert-Font (Schwenker-Overlay, groß)
  - file: "gfonts://Roboto@400"
    id: font_arc_val
    size: 56
    bpp: 4
    glyphs: "0123456789.s% AM"

  # Großes Drehsymbol für Schwenker-Button (Font Awesome arrows-rotate U+F021)
  - file: "https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/webfonts/fa-solid-900.ttf"
    id: font_icon_xl
    size: 120
    bpp: 4
    glyphs:
      - "\uF021"  # arrows-rotate (Schwenken, links+rechts)
      - "\uF2F9"  # rotate-right  (Drehen, nur rechts)

  # Auto-Motor-Button: Drehsymbol ~30% größer als font_icons (40→53px)
  - file: "https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/webfonts/fa-solid-900.ttf"
    id: font_icons_md
    size: 64
    bpp: 4
    glyphs:
      - "\uF021"  # arrows-rotate

  # Auto-Motor-Button: A ~30% größer als font_normal (28→37px)
  - file: "gfonts://Roboto@700"
    id: font_auto_a
    size: 37
    bpp: 4
    glyphs: "A"

  # IR-Temperatur-Overlay: Laser-Icon 80px (bewusst kleiner als Temp-Wert)
  - file: "https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/webfonts/fa-solid-900.ttf"
    id: font_icon_ts
    size: 80
    bpp: 4
    glyphs:
      - "\uF05B"  # Crosshairs / Laser (IR)

  # cd_mini buttonmatrix Zifferntasten (42px, ~50% größer als font_normal)
  - file: "gfonts://Roboto@700"
    id: font_cd_btn
    size: 42
    bpp: 4
    glyphs: "0123456789. "

  # IR-Temperatur-Overlay: Temperaturwert 120px
  - file: "gfonts://Roboto@700"
    id: font_ts_xl
    size: 120
    bpp: 4
    glyphs: "0123456789.,-\xc2\xb0C "

# SVG-Symbole für Slot Timer/Countdown Buttons
image:
  - file: graphics/stopwatch_23f1.svg
    id: img_stopwatch
    resize: 60x60
    type: RGB
    transparency: alpha_channel
  - file: graphics/cowntdown_23f3.svg
    id: img_countdown
    resize: 60x60
    type: RGB
    transparency: alpha_channel
  # 120px (200%) Hintergrundsymbole für Slot1 running_view
  - file: graphics/stopwatch_23f1.svg
    id: img_stopwatch_bg
    resize: 120x120
    type: RGB
    transparency: alpha_channel
  - file: graphics/cowntdown_23f3.svg
    id: img_countdown_bg
    resize: 120x120
    type: RGB
    transparency: alpha_channel

# Timer-Globals für alle 6 Slots
# Status: 0=gestoppt  1=läuft  2=pausiert
globals:
  - id: slot_start_ms
    type: std::array<uint32_t, 6>
    restore_value: false
    initial_value: '{0, 0, 0, 0, 0, 0}'
  - id: slot_elapsed_ms
    type: std::array<uint32_t, 6>
    restore_value: false
    initial_value: '{0, 0, 0, 0, 0, 0}'
  - id: slot_status
    type: std::array<int, 6>
    restore_value: false
    initial_value: '{0, 0, 0, 0, 0, 0}'
  # Helligkeits-Automodus (VEML7700)
  - id: brightness_auto_mode
    type: bool
    restore_value: false
    initial_value: 'true'
  - id: brightness_auto_updating
    type: bool
    restore_value: false
    initial_value: 'false'
  # LED-Helligkeits-Automodus (VEML7700)
  - id: led_auto_brightness
    type: bool
    restore_value: false
    initial_value: 'true'
  - id: led_auto_updating
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: system_ein
    type: bool
    restore_value: true
    initial_value: 'false'
  - id: global_leds_per_slot
    type: float
    restore_value: true
    initial_value: '9.0'
  # ── Timer / Countdown ──────────────────────────────────────
  - id: slot_is_countdown
    type: std::array<bool, 6>
    restore_value: false
    initial_value: '{false, false, false, false, false, false}'
  - id: slot_countdown_max_ms
    type: std::array<uint32_t, 6>
    restore_value: true
    initial_value: '{240000, 240000, 240000, 240000, 240000, 240000}'
  # ── Countdown Mini-Overlay ─────────────────────────────────────
  - id: overlay_cd_slot
    type: int
    restore_value: false
    initial_value: '0'
  - id: overlay_cd_mode
    type: int
    restore_value: false
    initial_value: '0'
  - id: overlay_cd_selected_min
    type: std::array<int, 6>
    restore_value: true
    initial_value: '{0, 0, 0, 0, 0, 0}'
sensor:
  - platform: template
    id: sensor_leds_per_slot
    internal: true
    accuracy_decimals: 0

binary_sensor:
  - platform: template
    id: bin_slot1_blink
    internal: true
  - platform: template
    id: bin_slot2_blink
    internal: true
  - platform: template
    id: bin_slot3_blink
    internal: true
  - platform: template
    id: bin_slot4_blink
    internal: true
  - platform: template
    id: bin_slot5_blink
    internal: true
  - platform: template
    id: bin_slot6_blink
    internal: true

script:
  - id: set_countdown_secs
    parameters:
      secs: int
    then:
      - lambda: |-
          int i = id(overlay_cd_slot);
          if (i < 0 || i > 5) return;
          id(overlay_cd_selected_min)[i] = secs;
          id(slot_countdown_max_ms)[i] = (uint32_t)secs * 1000U;
          id(slot_is_countdown)[i] = true;

          if (id(overlay_cd_mode) == 0) {
            id(slot_elapsed_ms)[i] = 0;
            id(slot_start_ms)[i] = millis();
            id(slot_status)[i] = 1;

            lv_obj_t* default_v[6] = {
              id(slot1_default_view), id(slot2_default_view), id(slot3_default_view),
              id(slot4_default_view), id(slot5_default_view), id(slot6_default_view)
            };
            lv_obj_t* running_v[6] = {
              id(slot1_running_view), id(slot2_running_view), id(slot3_running_view),
              id(slot4_running_view), id(slot5_running_view), id(slot6_running_view)
            };
            lv_obj_add_flag(default_v[i], LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(running_v[i], LV_OBJ_FLAG_HIDDEN);
            if (id(auto_motorbetrieb)) {
              if (id(dr_modus)) id(script_drehen_start)->execute();
              else              id(script_schwenker_start)->execute();
            }
          }
          lv_obj_add_flag(id(overlay_cd_mini), LV_OBJ_FLAG_HIDDEN);

  - id: script_slot_stop
    parameters:
      slot_idx: int
    then:
      - lambda: |-
          int i = slot_idx;
          if (i < 0 || i > 5) return;
          if (id(slot_status)[i] == 1)
            id(slot_elapsed_ms)[i] += millis() - id(slot_start_ms)[i];
          id(slot_elapsed_ms)[i] = 0;
          id(slot_start_ms)[i] = 0;
          id(slot_status)[i] = 0;
          esphome::binary_sensor::BinarySensor* blink_s[6] = {
            id(bin_slot1_blink), id(bin_slot2_blink), id(bin_slot3_blink),
            id(bin_slot4_blink), id(bin_slot5_blink), id(bin_slot6_blink)
          };
          blink_s[i]->publish_state(false);
          const uint32_t slot_fc[6] = {0xFF0000,0xFFFF00,0x00FF00,0x00FFFF,0x0000FF,0xFF00FF};
          lv_obj_t* slot_tab_btn[6] = {
            id(slot1_tab), id(slot2_tab), id(slot3_tab),
            id(slot4_tab), id(slot5_tab), id(slot6_tab)
          };
          lv_obj_set_style_bg_color(slot_tab_btn[i], lv_color_hex(slot_fc[i]), 0);
          lv_obj_t* slot_time_lbl[6] = {
            id(lbl_slot1_time), id(lbl_slot2_time), id(lbl_slot3_time),
            id(lbl_slot4_time), id(lbl_slot5_time), id(lbl_slot6_time)
          };
          lv_label_set_text(slot_time_lbl[i], "00:00");
          lv_obj_t* running_v[6] = {
            id(slot1_running_view), id(slot2_running_view), id(slot3_running_view),
            id(slot4_running_view), id(slot5_running_view), id(slot6_running_view)
          };
          lv_obj_t* default_v[6] = {
            id(slot1_default_view), id(slot2_default_view), id(slot3_default_view),
            id(slot4_default_view), id(slot5_default_view), id(slot6_default_view)
          };
          lv_obj_add_flag(running_v[i], LV_OBJ_FLAG_HIDDEN);
          lv_obj_clear_flag(default_v[i], LV_OBJ_FLAG_HIDDEN);
          if (id(auto_motorbetrieb)) {
            bool _any_active = false;
            for (int _j = 0; _j < 6; _j++) {
              if (_j == i) continue;
              if (id(slot_status)[_j] > 0 || blink_s[_j]->state) { _any_active = true; break; }
            }
            if (_any_active) {
              if (id(dr_modus)) id(script_drehen_start)->execute();
              else id(script_schwenker_start)->execute();
            } else {
              // Letzter aktiver Slot gestoppt → Slot anfahren (wie bei Pause/Ende)
              id(script_schwenker_goto_slot)->execute(i + 1);
            }
          }

  - id: script_slot_start
    parameters:
      slot_idx: int
    then:
      - lambda: |-
          int i = slot_idx;
          if (i < 0 || i > 5) return;
          id(slot_is_countdown)[i] = false;
          id(slot_elapsed_ms)[i] = 0;
          id(slot_start_ms)[i] = millis();
          id(slot_status)[i] = 1;
          lv_obj_t* slot_time_lbl[6] = {
            id(lbl_slot1_time), id(lbl_slot2_time), id(lbl_slot3_time),
            id(lbl_slot4_time), id(lbl_slot5_time), id(lbl_slot6_time)
          };
          lv_label_set_text(slot_time_lbl[i], "00:00");
          lv_obj_t* default_v[6] = {
            id(slot1_default_view), id(slot2_default_view), id(slot3_default_view),
            id(slot4_default_view), id(slot5_default_view), id(slot6_default_view)
          };
          lv_obj_t* running_v[6] = {
            id(slot1_running_view), id(slot2_running_view), id(slot3_running_view),
            id(slot4_running_view), id(slot5_running_view), id(slot6_running_view)
          };
          lv_obj_add_flag(default_v[i], LV_OBJ_FLAG_HIDDEN);
          lv_obj_clear_flag(running_v[i], LV_OBJ_FLAG_HIDDEN);
          if (id(auto_motorbetrieb)) {
            if (id(dr_modus)) id(script_drehen_start)->execute();
            else id(script_schwenker_start)->execute();
          }

  - id: script_slot_pause_resume
    parameters:
      slot_idx: int
    then:
      - lambda: |-
          int i = slot_idx;
          if (i < 0 || i > 5) return;
          if (id(slot_status)[i] == 0) return;
          if (id(slot_status)[i] == 1) {
            id(slot_elapsed_ms)[i] += millis() - id(slot_start_ms)[i];
            id(slot_status)[i] = 2;
            // Timer-Label mit festem ':' einfrieren (kein Blinken im Pause-Zustand)
            {
              lv_obj_t* tlbl = nullptr;
              switch(i) {
                case 0: tlbl = id(lbl_slot1_time); break;
                case 1: tlbl = id(lbl_slot2_time); break;
                case 2: tlbl = id(lbl_slot3_time); break;
                case 3: tlbl = id(lbl_slot4_time); break;
                case 4: tlbl = id(lbl_slot5_time); break;
                case 5: tlbl = id(lbl_slot6_time); break;
              }
              if (tlbl) {
                char pbuf[8];
                uint32_t tms = id(slot_elapsed_ms)[i];
                if (id(slot_is_countdown)[i]) {
                  uint32_t mms = id(slot_countdown_max_ms)[i];
                  uint32_t rem = (tms < mms) ? (mms - tms) : 0;
                  uint32_t s = rem / 1000;
                  snprintf(pbuf, sizeof(pbuf), "%02u:%02u", (unsigned)(s/60), (unsigned)(s%60));
                } else {
                  uint32_t s = tms / 1000;
                  snprintf(pbuf, sizeof(pbuf), "%02u:%02u", (unsigned)(s/60), (unsigned)(s%60));
                }
                lv_label_set_text(tlbl, pbuf);
              }
            }
            if (id(auto_motorbetrieb)) id(script_schwenker_goto_slot)->execute(i + 1);
          } else {
            id(slot_start_ms)[i] = millis();
            id(slot_status)[i] = 1;
            if (id(auto_motorbetrieb)) {
              if (id(dr_modus)) id(script_drehen_start)->execute();
              else id(script_schwenker_start)->execute();
            }
          }

  - id: script_open_countdown_overlay
    parameters:
      slot_idx: int
      mode: int
    then:
      - lambda: |-
          id(overlay_cd_slot) = slot_idx;
          id(overlay_cd_mode) = mode;
          // Position: Links (0-2) x=15, Rechts (3-5) x=609; y folgt Slot-Position
          const int slot_ys[6] = {110, 250, 390, 110, 250, 390};
          int ox = (slot_idx < 3) ? 15 : (1024 - 510 - 15);
          int oy = slot_ys[slot_idx];
          lv_obj_set_pos(id(overlay_cd_mini), ox, oy);
          lv_obj_clear_flag(id(overlay_cd_mini), LV_OBJ_FLAG_HIDDEN);

interval:
  - interval: 500ms
    then:
      - lambda: |-
          char buf[8];
          // ── Blink-Phase (500 ms Takt) ────────────────────────────────
          static bool tc_blink_phase = false;
          tc_blink_phase = !tc_blink_phase;
          lv_obj_t* slot_time_lbl[6] = {
            id(lbl_slot1_time), id(lbl_slot2_time), id(lbl_slot3_time),
            id(lbl_slot4_time), id(lbl_slot5_time), id(lbl_slot6_time)
          };
          lv_obj_t* slot_title_lbl[6] = {
            id(lbl_slot1_timer_title), id(lbl_slot2_timer_title), id(lbl_slot3_timer_title),
            id(lbl_slot4_timer_title), id(lbl_slot5_timer_title), id(lbl_slot6_timer_title)
          };
          lv_obj_t* slot_sym_lbl[6] = {
            id(lbl_slot1_symbol), id(lbl_slot2_symbol), id(lbl_slot3_symbol),
            id(lbl_slot4_symbol), id(lbl_slot5_symbol), id(lbl_slot6_symbol)
          };
          lv_obj_t* slot_tab_btn[6] = {
            id(slot1_tab), id(slot2_tab), id(slot3_tab),
            id(slot4_tab), id(slot5_tab), id(slot6_tab)
          };
          const uint32_t slot_fc[6] = {0xFF0000,0xFFFF00,0x00FF00,0x00FFFF,0x0000FF,0xFF00FF};
          esphome::binary_sensor::BinarySensor* blink_s[6] = {
            id(bin_slot1_blink), id(bin_slot2_blink), id(bin_slot3_blink),
            id(bin_slot4_blink), id(bin_slot5_blink), id(bin_slot6_blink),
          };
          for (int ii = 0; ii < 6; ii++) {
            // Titel: Timer / Countdown dynamisch
            lv_label_set_text(slot_title_lbl[ii], id(slot_is_countdown)[ii] ? "Countdown" : "Timer");
            // Blink: Tab-Farbe pulsieren lassen (bin_slotX_blink – safe in lambda)
            if (blink_s[ii]->state) {
              lv_obj_set_style_bg_color(slot_tab_btn[ii],
                tc_blink_phase ? lv_color_hex(slot_fc[ii]) : lv_color_hex(0x222222), 0);
            }
            if (id(slot_status)[ii] != 1) continue;
            uint32_t total_ms = id(slot_elapsed_ms)[ii] + (millis() - id(slot_start_ms)[ii]);
            if (id(slot_is_countdown)[ii]) {
              uint32_t max_ms = id(slot_countdown_max_ms)[ii];
              if (total_ms >= max_ms) {
                // Countdown abgelaufen: Alarm auslösen
                id(slot_elapsed_ms)[ii] = 0;
                id(slot_start_ms)[ii] = millis();
                id(slot_status)[ii] = 2;
                blink_s[ii]->publish_state(true);
                lv_label_set_text(slot_time_lbl[ii], "00:00");
                lv_label_set_text(slot_sym_lbl[ii], "\xef\x81\x8b");
                // Motor-Automode: bei CD-Ablauf → Slot anfahren
                if (id(auto_motorbetrieb)) {
                  id(script_schwenker_goto_slot)->execute(ii + 1);
                }
              } else {
                uint32_t rem = max_ms - total_ms;
                uint32_t s = rem / 1000;
                snprintf(buf, sizeof(buf), "%02u%s%02u", (unsigned)(s/60), tc_blink_phase ? ":" : " ", (unsigned)(s%60));
                lv_label_set_text(slot_time_lbl[ii], buf);
              }
            } else {
              uint32_t s = total_ms / 1000;
              snprintf(buf, sizeof(buf), "%02u%s%02u", (unsigned)(s/60), tc_blink_phase ? ":" : " ", (unsigned)(s%60));
              lv_label_set_text(slot_time_lbl[ii], buf);
            }
          }
          // AMG8833 Overlay aktualisieren wenn sichtbar
          if (!lv_obj_has_flag(id(overlay_amg8833), LV_OBJ_FLAG_HIDDEN)) {
            amg_update_cells(id(amg_pixel_temps).data());
          }
          // Uhrzeit in Statusleiste aktualisieren (SNTP)
          auto t = id(sntp_time).now();
          if (t.is_valid()) {
            char tbuf[9];
            snprintf(tbuf, sizeof(tbuf), "%02d:%02d:%02d", t.hour, t.minute, t.second);
            lv_label_set_text(id(lbl_status_clock), tbuf);
            static const char* wdays[] = {"Sonntag", "Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag"};
            char dbuf[24];
            int dow = t.day_of_week - 1;  // ESPHome: 1=Sonntag..7=Samstag → 0-basiert
            if (dow < 0 || dow > 6) dow = 0;  // Bounds check
            snprintf(dbuf, sizeof(dbuf), "%s, %02d.%02d.", wdays[dow], t.day_of_month, t.month);
            lv_label_set_text(id(lbl_status_date), dbuf);
          }
          // ── Auto-Stop: Schwenker stoppen + Slot anfahren wenn alle Timer/CDs enden ──
          if (id(sw_auto_stop_armed) && id(sw_aktiv)) {
            bool any_running = false;
            for (int _j = 0; _j < 6; _j++) {
              if (id(slot_status)[_j] == 1) { any_running = true; break; }
            }
            if (!any_running) {
              int target = id(sw_auto_stop_slot) + 1;  // 0-basiert → 1-basiert
              id(sw_auto_stop_armed) = false;
              ESP_LOGI("schwenker", "Auto-Stop: alle Timer beendet, fahre Slot %d an", target);
              id(script_schwenker_goto_slot)->execute(target);
            }
          }
          // ── Auto-Arm: dr_auto_stop_armed aktuell halten wenn Slot läuft ─────
          if (id(dr_aktiv)) {
            for (int _k = 0; _k < 6; _k++) {
              if (id(slot_status)[_k] == 1) {
                id(dr_auto_stop_armed) = true;
                break;
              }
            }
          }
          // ── Auto-Stop: Drehmodus stoppen wenn alle Timer/CDs enden ──────────────
          if (id(dr_auto_stop_armed) && id(dr_aktiv)) {
            bool any_running = false;
            for (int _j = 0; _j < 6; _j++) {
              if (id(slot_status)[_j] == 1) { any_running = true; break; }
            }
            if (!any_running) {
              id(dr_auto_stop_armed) = false;
              ESP_LOGI("drehen", "Auto-Stop: alle Timer beendet, stoppe Drehmodus");
              id(script_drehen_stop)->execute();
            }
          }
      # ── Hintergrundsymbole: Stopuhr ↔ Countdown per bg_image_src ──
      - if:
          condition:
            lambda: 'return id(slot_is_countdown)[0];'
          then:
            - lvgl.widget.update:
                id: slot1_running_view
                bg_image_src: img_countdown_bg
          else:
            - lvgl.widget.update:
                id: slot1_running_view
                bg_image_src: img_stopwatch_bg
      - if:
          condition:
            lambda: 'return id(slot_is_countdown)[1];'
          then:
            - lvgl.widget.update:
                id: slot2_running_view
                bg_image_src: img_countdown_bg
          else:
            - lvgl.widget.update:
                id: slot2_running_view
                bg_image_src: img_stopwatch_bg
      - if:
          condition:
            lambda: 'return id(slot_is_countdown)[2];'
          then:
            - lvgl.widget.update:
                id: slot3_running_view
                bg_image_src: img_countdown_bg
          else:
            - lvgl.widget.update:
                id: slot3_running_view
                bg_image_src: img_stopwatch_bg
      - if:
          condition:
            lambda: 'return id(slot_is_countdown)[3];'
          then:
            - lvgl.widget.update:
                id: slot4_running_view
                bg_image_src: img_countdown_bg
          else:
            - lvgl.widget.update:
                id: slot4_running_view
                bg_image_src: img_stopwatch_bg
      - if:
          condition:
            lambda: 'return id(slot_is_countdown)[4];'
          then:
            - lvgl.widget.update:
                id: slot5_running_view
                bg_image_src: img_countdown_bg
          else:
            - lvgl.widget.update:
                id: slot5_running_view
