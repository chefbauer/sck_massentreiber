# ── Komponenten ──────────────────────────────────────────────────────────────────
#  globals:  cooler_system_status_set,
#            icebank_enabled, eisbank_laeuft, eisbank_dauer_min,
#            eisbank_start_ms, thermostat_ziel_x10,
#            kuehl_last_temp, kuehl_last_change_ms,
#            kuehl_p_watts, kuehl_kompressor_start_ms,
#            kuehl_komp_war_ein, kuehl_dreher_war_aktiv
#  Algorithmus: bei jedem 0.05°C-Schritt → P = m·c·ΔT/Δt (m=12kg, c=4186 J/kg·K)
#  script:   script_kuehl_update  (von sensor_temp_becken.on_value aufgerufen)
#  Steuerung: vollständig in thermostat_steuerung + ruehrwerk_steuerung (hardware.yaml, 1s)
# ─────────────────────────────────────────────────────────────────────────────────

globals:
  - id: cooler_system_status_set
    type: int
    restore_value: true
    initial_value: '0'
    # Werte:
    # 0 = aus
    # 1 = standby
    # 2 = ein
    # 3 = aktiv

  # ── Eisbank ──────────────────────────────────────────────────────────────────
  - id: icebank_enabled
    type: bool
    restore_value: yes
    initial_value: 'false'
    # Schalter: Eisbank-Feature ein/aus (persistiert über Reboot)

  - id: eisbank_laeuft
    type: bool
    restore_value: no
    initial_value: 'false'
    # True solange Eisbank-Modus aktiv läuft

  - id: eisbank_dauer_min
    type: int
    restore_value: yes
    initial_value: '10'
    # Eisbank-Laufzeit in Minuten (0 = deaktiviert, 1–30)

  - id: eisbank_start_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
    # millis()-Zeitstempel beim Eisbank-Start

  - id: thermostat_ziel_x10
    type: int
    restore_value: yes
    initial_value: '8'
    # Zieltemperatur × 10 (z. B. 8 = 0.8 °C), restore_value: yes

  - id: ice_run_allowed
    type: bool
    restore_value: no
    initial_value: 'true'
    # ICE-Neustart erlaubt? false nach Timer-Ablauf, true nach: temp>soll / Motor-Start / Schalter-Ein

  # ── Kühl-Saldo Leistungsberechnung ──────────────────────────────────────────
  - id: kuehl_last_temp
    type: float
    restore_value: no
    initial_value: 'NAN'
    # Letzter gespeicherter Temperaturwert für Δ-Erkennung

  - id: kuehl_last_change_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
    # millis()-Zeitstempel des letzten Temperatursprungs

  - id: kuehl_p_watts
    type: float
    restore_value: no
    initial_value: '0.0'
    # Aktuell angezeigter Leistungssaldo in W

  - id: kuehl_kompressor_start_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
    # millis() beim letzten Kompressor-Einschalten

  - id: kuehl_komp_war_ein
    type: bool
    restore_value: no
    initial_value: 'false'
    # Kompressorstatus beim letzten Durchlauf (Flanken-Erkennung)

  - id: kuehl_dreher_war_aktiv
    type: bool
    restore_value: no
    initial_value: 'false'
    # Dreh-/Schwenkstatus beim letzten Durchlauf (Flanken-Erkennung)

  # ── Chart-Verlauf Ringpuffer (720 Punkte = 2h bei 10s-Intervall) ────────────
  - id: chart_temp_buf
    type: std::array<int16_t, 720>
    restore_value: no
    initial_value: '{0}'
    # Temperatur × 10 als int16_t; INT16_MIN = ungültig

  - id: chart_komp_buf
    type: std::array<uint8_t, 720>
    restore_value: no
    initial_value: '{0}'
    # Kompressor-Zustand: 1=ein, 0=aus

  - id: chart_fill_count
    type: int
    restore_value: no
    initial_value: '0'
    # Anzahl gültiger Punkte (0..720)

  - id: chart_write_idx
    type: int
    restore_value: no
    initial_value: '0'
    # Ringpuffer-Schreibzeiger (nächster Schreibplatz)

  - id: kuehl_chart_visible
    type: bool
    restore_value: no
    initial_value: 'false'
    # true wenn overlay_cooling sichtbar (vermeidet lv_obj_has_flag in Lambda)

script:
  # Leistungssaldo berechnen + Display aktualisieren.
  # Wird aus sensor_temp_becken.on_value aufgerufen (hardware.yaml + ble.yaml).
  # P = m·c·ΔT/Δt = 12 kg · 4186 J/kg/K · 0,1 K / Δt(s) ≈ 502 / Δt(s)
  - id: script_kuehl_update
    mode: single
    then:
      - lambda: |-
          // Auf 0.05°C-Raster bereits im Sensor gerundet → direkt verwenden
          static int      kuehl_trend          = 0;   // -1=fällt, 0=unbekannt, +1=steigt
          static uint32_t kuehl_trend_since_ms = 0;   // millis() beim letzten Trendwechsel
          float new_temp = id(sensor_temp_becken).state;
          if (isnan(new_temp)) return;

          uint32_t now = millis();
          bool dreher_aktiv = id(sw_aktiv) || id(dr_aktiv);

          // ── Kompressor-Startzeit tracken (Flankenerkennung) ──────────────────
          bool komp_jetzt = id(kompressor_soll_ein);
          if (komp_jetzt && !id(kuehl_komp_war_ein)) {
            id(kuehl_kompressor_start_ms) = now;
          }
          id(kuehl_komp_war_ein) = komp_jetzt;

          // ── Initialisierung beim ersten validen Wert ──────────────────────────
          if (isnan(id(kuehl_last_temp))) {
            id(kuehl_last_temp) = new_temp;
            id(kuehl_last_change_ms) = now;
            id(kuehl_dreher_war_aktiv) = dreher_aktiv;
            return;
          }

          // ── Dreher-Start: Display auf 0 zurücksetzen ─────────────────────────
          if (dreher_aktiv && !id(kuehl_dreher_war_aktiv)) {
            id(kuehl_p_watts) = 0.0f;
            id(kuehl_last_temp) = new_temp;  // bereits gerundet
            id(kuehl_last_change_ms) = now;
            kuehl_trend          = 0;   // Trend zurücksetzen
            kuehl_trend_since_ms = now;
            id(kuehl_dreher_war_aktiv) = dreher_aktiv;
            lv_label_set_text(id(lbl_kuehlsaldo), "0W");
            lv_obj_set_style_bg_color(id(obj_kuehlsaldo_bg), lv_color_hex(0x70C9E0), 0);
            lv_obj_set_style_text_color(id(lbl_kuehlsaldo), lv_color_hex(0x003366), 0);
            lv_obj_clear_flag(id(lbl_kuehlsaldo_getraenk), LV_OBJ_FLAG_HIDDEN);
            return;
          }
          id(kuehl_dreher_war_aktiv) = dreher_aktiv;

          // ── Temperaturdelta detektieren: erst ab 0.10°C Unterschied ─────────
          float delta = new_temp - id(kuehl_last_temp);
          if (fabsf(delta) < 0.09f) return;   // weniger als 2 × 0.05°C-Schritte → ignorieren

          uint32_t dt_ms = now - id(kuehl_last_change_ms);
          id(kuehl_last_temp) = new_temp;
          id(kuehl_last_change_ms) = now;

          // Sanity-Check: dt zwischen 0,8 s und 3 min
          if (dt_ms < 800 || dt_ms > 180000) return;

          // ── Trend-Sperre: Richtungswechsel erst nach 5s erlaubt ──────────────
          // Strömungsbedingte kurze Gegenläufer (1-2s, 0.05°C) werden ignoriert.
          // last_temp/last_ms sind bereits aktualisiert → nächstes delta korrekt.
          int new_trend = (delta < 0.0f) ? -1 : 1;
          if (new_trend != kuehl_trend && kuehl_trend != 0) {
            if ((now - kuehl_trend_since_ms) < 5000U) return;  // zu früh
          }
          if (new_trend != kuehl_trend) {
            kuehl_trend = new_trend;
          } else {
            kuehl_trend_since_ms = now;  // Trend bestätigt, Fenster erneuern
          }

          // ── Rohleistung berechnen ──────────────────────────────────────────────────
          //  P = m · c · ΔT / Δt  (m=12 kg, c=4186 J/kg·K)
          //  ΔT = jeweiliger Schritt auf 0.05°C-Raster (typisch 0.05, selten 0.10+)
          //  Δt = Zeit seit letztem 0.05°C-Schritt → direkte Leistung, kein Puffer-Lag
          float dt_s = dt_ms / 1000.0f;
          float p_raw = (12.0f * 4186.0f * fabsf(delta)) / dt_s;
          float p_signed = (delta > 0.0f) ? p_raw : -p_raw;
          float p_avg = p_signed;

          // ── Kompressor-Offset (nur wenn Dreher läuft und Komp ≥ 30 s ein) ───
          float p_display = p_avg;
          if (dreher_aktiv) {
            uint32_t ks = id(kuehl_kompressor_start_ms);
            if (komp_jetzt && ks > 0 && (now - ks) >= 30000U) {
              p_display = p_avg + 300.0f;
            }
            if (p_display < 0.0f) p_display = 0.0f;  // auf 0 clampen
          }
          id(kuehl_p_watts) = p_display;

          // ── Farbe bestimmen ───────────────────────────────────────────────────
          uint32_t bg_col, txt_col;
          if (dreher_aktiv) {
            // Dreher läuft: immer blau (Getränkekühlung)
            bg_col  = 0x70C9E0;
            txt_col = 0x003366;
          } else if (delta > 0.0f) {
            // Motor aus + Erwärmung = Systemverluste → rot
            bg_col  = 0xCC2222;
            txt_col = 0xFFFFFF;
          } else {
            // Motor aus + Abkühlung = Kompressor kühlt leer → blau
            bg_col  = 0x70C9E0;
            txt_col = 0x003366;
          }

          // ── Display aktualisieren ─────────────────────────────────────────────
          char tbuf[10];
          int p_show = std::min(9999, (int)roundf(fabsf(p_display)));
          snprintf(tbuf, sizeof(tbuf), "%dW", p_show);
          lv_label_set_text(id(lbl_kuehlsaldo), tbuf);
          lv_obj_set_style_bg_color(id(obj_kuehlsaldo_bg),  lv_color_hex(bg_col),  0);
          lv_obj_set_style_text_color(id(lbl_kuehlsaldo), lv_color_hex(txt_col), 0);

          // Getränkesymbol: sichtbar wenn Dreher läuft
          if (dreher_aktiv) {
            lv_obj_clear_flag(id(lbl_kuehlsaldo_getraenk), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(id(lbl_kuehlsaldo_getraenk), LV_OBJ_FLAG_HIDDEN);
          }

  # Temperatur- und Kompressor-Linien im Cooling-Overlay neu zeichnen.
  # Wird beim Öffnen des Overlays und alle 10s (wenn sichtbar) aufgerufen.
  # Koordinaten: px=70+i*840/(count-1), py=65+(300-clamp(val,-100,300))
  # val = temp*10 (int16_t), Kompressor ON→y=500, OFF→y=-20
  - id: script_kuehl_chart_draw
    mode: single
    then:
      - lambda: |-
          int count = id(chart_fill_count);
          if (count < 2) return;
          int ridx = ((id(chart_write_idx) - count) % 720 + 720) % 720;
          // ── Temperatur-Trace ──────────────────────────────────────────────
          static lv_point_precise_t temp_pts[720];
          int tvalid = 0;
          for (int i = 0; i < count; i++) {
            int buf_idx = (ridx + i) % 720;
            int16_t val = id(chart_temp_buf)[buf_idx];
            if (val == INT16_MIN) val = -100;  // ungültig → Unterrand
            int clamped = std::max(-100, std::min(300, (int)val));
            int py = 65 + (300 - clamped);
            int px = 70 + (int)((int64_t)i * 840 / (count - 1));
            temp_pts[tvalid++] = {(lv_value_precise_t)px, (lv_value_precise_t)py};
          }
          if (tvalid >= 2) lv_line_set_points(id(line_temp_trace)->obj, temp_pts, tvalid);
          // ── Kompressor-Trace (ON=y500, OFF=y-20) ─────────────────────────
          static lv_point_precise_t komp_pts[720];
          for (int i = 0; i < count; i++) {
            int buf_idx = (ridx + i) % 720;
            int px = 70 + (int)((int64_t)i * 840 / (count - 1));
            int py = id(chart_komp_buf)[buf_idx] ? 500 : -20;
            komp_pts[i] = {(lv_value_precise_t)px, (lv_value_precise_t)py};
          }
          lv_line_set_points(id(line_komp_trace)->obj, komp_pts, count);

interval:
  # Chart-Ringpuffer befüllen + Linien aktualisieren wenn Overlay sichtbar
  - interval: 10s
    then:
      - lambda: |-
          float t = id(sensor_temp_becken).state;
          int widx = id(chart_write_idx);
          id(chart_temp_buf)[widx] = isnan(t) ? INT16_MIN : (int16_t)(t * 10.0f);
          id(chart_komp_buf)[widx] = id(kompressor_soll_ein) ? 1 : 0;
          id(chart_write_idx) = (widx + 1) % 720;
          if (id(chart_fill_count) < 720) id(chart_fill_count)++;
          if (!id(kuehl_chart_visible)) return;
          id(script_kuehl_chart_draw)->execute();

